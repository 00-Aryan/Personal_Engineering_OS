name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install package
        env:
          UV_SYSTEM_PYTHON: "1"
        run: uv pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          mkdir -p coverage-report
          python -m trace --count --summary --coverdir coverage-report --module pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

  quality:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install package
        env:
          UV_SYSTEM_PYTHON: "1"
        run: uv pip install -e ".[dev]"

      - name: Run quality benchmark
        run: uv run --no-sync python scripts/quality_benchmark.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark_results.md
          path: docs/benchmark_results.md

  real-api:
    if: ${{ secrets.GEMINI_API_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install package
        env:
          UV_SYSTEM_PYTHON: "1"
        run: uv pip install -e ".[dev]"

      - name: Run Real API Smoke Test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/real_api_smoke.py
