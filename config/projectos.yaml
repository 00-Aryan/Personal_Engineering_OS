# ProjectOS Master Configuration
# Edit this file to configure your installation.
# Run: projectos config validate to check for errors.

version: "0.3.0"

# --- Project ---
project:
  name: "my-project"
  root: "."
  state_dir: ".projectos_state"
  watch_patterns: ["*.py"]
  ignore_patterns: ["__pycache__", ".venv", ".git", "test_*"]

# --- Providers ---
providers:
  default: gemini-2.5-flash
  
  gemini-2.5-flash:
    type: gemini
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
    
  deepseek-v3:
    type: openrouter
    model: google/gemma-4-31b-it:free
    api_key_env: OPENROUTER_API_KEY
    
  ollama-local:
    type: ollama
    model: llama3.2:1b
    base_url_env: OLLAMA_BASE_URL
    base_url_default: http://localhost:11434

# --- Agent Model Assignments ---
agents:
  clone:        gemini-2.5-flash
  project_intake: deepseek-v3
  planning:     deepseek-v3
  code_writing: gemini-2.5-flash
  code_review:  gemini-2.5-flash
  architecture: deepseek-v3
  test:         gemini-2.5-flash
  docs:         gemini-2.5-flash

# --- Fallback Chains ---
fallbacks:
  planning:     [deepseek-v3, gemini-2.5-flash, ollama-local]
  code_writing: [gemini-2.5-flash, ollama-local]
  code_review:  [gemini-2.5-flash, ollama-local]

# --- Token Budgets ---
token_budgets:
  code_review:   {soft: 3000, hard: 6000, daily: 100000}
  code_writing:  {soft: 3000, hard: 6000, daily: 100000}
  planning:      {soft: 2000, hard: 4000, daily: 50000}
  architecture:  {soft: 2000, hard: 4000, daily: 30000}
  test:          {soft: 3000, hard: 6000, daily: 80000}
  docs:          {soft: 1500, hard: 3000, daily: 40000}
  clone:         {soft: 1000, hard: 2000, daily: 200000}

# --- Quality Gates ---
quality_gates:
  code_writing:
    min_score: 0.65
    require_llm_eval: true
    require_static: true
    block_security_high: true
    block_regression: true
  code_review:
    min_score: 0.70
    require_llm_eval: true
    require_static: false
    block_regression: true
  planning:
    min_score: 0.60
    require_llm_eval: true

# --- Circuit Breakers ---
circuit_breakers:
  failure_threshold: 5
  recovery_timeout_seconds: 60

# --- Alerts ---
alerts:
  daily_cost_inr_threshold: 100
  monthly_cost_inr_threshold: 2000
  quality_score_minimum: 0.60
  blocked_queue_max: 10
  evaluation_failure_rate_max: 0.30

# --- Cost Tracking ---
costs:
  usd_to_inr: 83.5

validation:
  max_new_file_lines: 150
  max_size_ratio: 2.5

notifications:
  telegram_enabled: true
  morning_brief_time: "08:00"
  evening_digest_time: "21:00"
  timezone: "Asia/Kolkata"

model_parameters:
  clone:
    temperature: 0.2
    max_tokens: 500
    top_p: 0.9
  planning:
    temperature: 0.3
    max_tokens: 1500
    top_p: 0.85
  code_writing:
    temperature: 0.1
    max_tokens: 1000
    top_p: 0.95
  code_review:
    temperature: 0.2
    max_tokens: 800
    top_p: 0.9
  architecture:
    temperature: 0.7
    max_tokens: 1000
    top_p: 0.9
  test:
    temperature: 0.1
    max_tokens: 1000
    top_p: 0.95
  docs:
    temperature: 0.2
    max_tokens: 600
    top_p: 0.9
  project_intake:
    temperature: 0.3
    max_tokens: 6000
    top_p: 0.9

ollama:
  base_url: "http://localhost:11434"
  preferred_models:
    - llama3.2:1b
    - llama3.2:3b
    - deepseek-r1:1.5b
  fallback_model: llama3.2:1b
  timeout_seconds: 120

projects:
  active:
    - name: tender_iq
      path: ~/June-2026/TenderIQ
      priority: 1
    - name: content_creation
      path: ~/June-2026/Content-Creation-Automation
      priority: 2


